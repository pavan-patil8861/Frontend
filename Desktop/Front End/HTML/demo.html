<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Most Popular Top Courses</title>
  <style>
    :root{
      --gap: 20px;
      --radius: 10px;
      --shadow: 0 6px 18px rgba(0,0,0,0.08);
      --blue: #1da1f2;
      --orange: #ff6b3d;
      --green: #7cc04e;
      --gold: #f6a019;
      --bg: #f7f8fb;
      --text: #222;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
    }

    .page {
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:48px 16px;
    }

    .wrapper {
      width:100%;
      max-width:1100px;
    }

    .section-header{
      text-align:center;
      margin-bottom:26px;
    }
    .section-header h1{
      margin:0;
      font-size:28px;
      font-weight:700;
      letter-spacing:0.2px;
    }
    .section-header .accent{ color:#6b5bff; }
    .section-header p{
      margin:8px 0 0;
      color:#666;
      font-size:14px;
    }

    /* Grid */
    .courses-grid{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      grid-template-columns: repeat(4, 1fr); /* 4 columns on wide screens */
      gap: var(--gap);
    }

    /* Responsive: reduce columns on smaller screens */
    @media (max-width: 980px){
      .courses-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 700px){
      .courses-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 420px){
      .courses-grid { grid-template-columns: 1fr; }
    }

    .course-card {
      border-radius: var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow);
      display:block;
      text-decoration:none;
      color: white;
      height:110px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:16px;
      padding:18px;
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .course-card:focus,
    .course-card:hover{
      transform: translateY(-6px);
      box-shadow: 0 14px 30px rgba(0,0,0,0.12);
      outline: none;
    }

    /* icon */
    .card-icon {
      width:44px;
      height:44px;
      flex:0 0 44px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background: rgba(255,255,255,0.12);
      border-radius:8px;
      padding:6px;
    }
    .card-label{
      font-size:16px;
      font-weight:600;
      margin:0;
    }

    /* color variants */
    .c-blue { background: linear-gradient(180deg, var(--blue), #0f9be8); }
    .c-orange { background: linear-gradient(180deg, var(--orange), #ff4f2a); }
    .c-green { background: linear-gradient(180deg, var(--green), #6cb93a); }
    .c-gold { background: linear-gradient(180deg, var(--gold), #f08f01); }

    /* small label layout when text is longer */
    .card-content{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:center;
    }
    .card-label-small{
      font-size:13px;
      font-weight:500;
      opacity:0.94;
    }

    /* accessibility focus */
    .course-card:focus{
      box-shadow: 0 0 0 3px rgba(99,102,241,0.18), 0 14px 30px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrapper">
      <header class="section-header" aria-labelledby="popular-courses-heading">
        <h1 id="popular-courses-heading">Most Popular Top <span class="accent">Courses</span></h1>
        <p>Lorem Ipsum is simply dummy text of the printing and typesetting industry</p>
      </header>

      <ul class="courses-grid" role="list" aria-label="Popular courses">
        <!-- Medical -->
        <li>
          <a class="course-card c-blue" href="#medical" aria-labelledby="label-medical">
            <span class="card-icon" aria-hidden="true">
              <!-- heart/medical icon -->
              <svg viewBox="0 0 24 24" width="28" height="28" fill="white" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                <path d="M12.1 21.35l-1.1-1.01C5.14 15.24 2 12.39 2 8.99 2 6.35 4.24 4.2 6.9 4.2c1.86 0 3.32 1.05 4.1 2.09.78-1.04 2.24-2.09 4.1-2.09 2.66 0 4.9 2.15 4.9 4.79 0 3.4-3.14 6.25-8.99 11.35l-1.1 1.01z"/>
              </svg>
            </span>
            <div class="card-content">
              <span id="label-medical" class="card-label">Medical</span>
            </div>
          </a>
        </li>

        <!-- Geography -->
        <li>
          <a class="course-card c-orange" href="#geography" aria-labelledby="label-geography">
            <span class="card-icon" aria-hidden="true">
              <!-- globe icon -->
              <svg viewBox="0 0 24 24" width="28" height="28" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2a10 10 0 100 20 10 10 0 000-20zm3 16.9a8.1 8.1 0 01-6 0c.3-1.9 1.2-3.5 2.7-4.6 1.5 1 2.4 2.7 3.3 4.6zM5.1 13A8.1 8.1 0 015 12c0-1 .2-2 .6-2.9 1.4.4 2.6 1.5 3.1 2.9-1.7.6-2.9 1.7-3.6 2z"/>
              </svg>
            </span>
            <div class="card-content">
              <span id="label-geography" class="card-label">Geography</span>
            </div>
          </a>
        </li>

        <!-- Sales -->
        <li>
          <a class="course-card c-green" href="#sales" aria-labelledby="label-sales">
            <span class="card-icon" aria-hidden="true">
              <!-- chart icon -->
              <svg viewBox="0 0 24 24" width="28" height="28" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 17h2v3H3v-3zm4-5h2v8H7v-8zm4-4h2v12h-2V8zm4 2h2v10h-2V10zm4-6h2v16h-2V4z"/>
              </svg>
            </span>
            <div class="card-content">
              <span id="label-sales" class="card-label">Sales</span>
            </div>
          </a>
        </li>

        <!-- Teacher -->
        <li>
          <a class="course-card c-gold" href="#teacher" aria-labelledby="label-teacher">
            <span class="card-icon" aria-hidden="true">
              <!-- book icon -->
              <svg viewBox="0 0 24 24" width="28" height="28" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 6h13a2 2 0 012 2v11H6a2 2 0 01-2-2V6zm16-2v12a2 2 0 01-2 2H6a4 4 0 00-4 4v-1a3 3 0 013-3h14V4a2 2 0 012-2z"/>
              </svg>
            </span>
            <div class="card-content">
              <span id="label-teacher" class="card-label">Teacher</span>
            </div>
          </a>
        </li>

        <!-- B.Tech -->
        <li>
          <a class="course-card c-blue" href="#btech" aria-labelledby="label-btech">
            <span class="card-icon" aria-hidden="true">
              <!-- camera/computer icon simple -->
              <svg viewBox="0 0 24 24" width="28" height="28" fill="white" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="5" width="18" height="12" rx="2"/>
                <path d="M8 19h8v2H8z" fill="white"/>
              </svg>
            </span>
            <div class="card-content">
              <span id="label-btech" class="card-label">B.Tech</span>
            </div>
          </a>
        </li>

        <!-- MBA -->
        <li>
          <a class="course-card c-orange" href="#mba" aria-labelledby="label-mba">
            <span class="card-icon" aria-hidden="true">
              <!-- graduation cap -->
              <svg viewBox="0 0 24 24" width="28" height="28" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L1 7l11 5 9-4.09V17h2V7L12 2zM11 13.13L3.3 9 11 5.87 18.7 9 11 13.13z"/>
              </svg>
            </span>
            <div class="card-content">
              <span id="label-mba" class="card-label">MBA</span>
            </div>
          </a>
        </li>

        <!-- Digitalization -->
        <li>
          <a class="course-card c-green" href="#digitalization" aria-labelledby="label-digitalization">
            <span class="card-icon" aria-hidden="true">
              <!-- camera-like / digital icon -->
              <svg viewBox="0 0 24 24" width="28" height="28" fill="white" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="10" r="3"/>
                <path d="M4 18h16v2H4z"/>
              </svg>
            </span>
            <div class="card-content">
              <span id="label-digitalization" class="card-label">Digitalization</span>
            </div>
          </a>
        </li>

        <!-- Marketing -->
        <li>
          <a class="course-card c-gold" href="#marketing" aria-labelledby="label-marketing">
            <span class="card-icon" aria-hidden="true">
              <!-- pie chart -->
              <svg viewBox="0 0 24 24" width="28" height="28" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M11 2v10L4.2 9.2A9 9 0 0111 2zM13 2c4.97 0 9 4.03 9 9a9 9 0 01-9 9c-4.97 0-9-4.03-9-9 0-4.37 3.05-8 7-8h2z"/>
              </svg>
            </span>
            <div class="card-content">
              <span id="label-marketing" class="card-label">Marketing</span>
            </div>
          </a>
        </li>
      </ul>
    </div>
  </main>
</body>
</html>
