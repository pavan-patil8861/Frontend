<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8boxes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        gap: 20px;
    }

    .mainBox {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .mainBox {
        width: 300px;
        text-align: center;
        padding: 20px 50px;
        background-color: rgb(245, 80, 80);
        border-radius: 7px;
    }

    .mainBox:hover {
        background-color: rgb(227, 179, 89);
        color: black;
    }

    .bi {
        font-size: 2rem;
    }

    h2 {
        text-align: center;
    }

    section {
        display: flex;
        height: 100vh;
        align-items: center;
        flex-wrap: wrap;
    }
</style>
<h1>Most Popular Top Courses</h1>
<section>

    <body>

        <div class="mainBox">
                <i class="bi bi-heart-pulse"></i>
                <h3>Medical</h3>
            </div>
        </div>
        <div class="mainBox">
            <i class="bi bi-globe-asia-australia"></i>
            <h3>Geography</h3>
        </div>

        <div class="mainBox">
            <i class="bi bi-graph-up-arrow"></i>
            <h3>Sales</h3>
        </div>
        <div class="mainBox">
            <i class="bi bi-book"></i>
            <h3>Teacher</h3>
        </div>
        <div class="mainBox">
            <i class="bi bi-camera"></i>
            <h3>B.Tech</h3>
        </div>
        <div class="mainBox">
            <i class="bi bi-journals"></i>
            <h3>M.B.A</h3>
        </div>
        <div class="mainBox">
            <i class="bi bi-camera"></i>
            <h3>Digitalization</h3>
        </div>
        <div class="mainBox">
            <i class="bi bi-pie-chart-fill"></i>
            <h3>Marketing</h3>
        </div>

    </body>

</section>

</html>
