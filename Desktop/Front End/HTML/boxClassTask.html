<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4_Boxes</title>
    <link rel="stylesheet" href="cdn.jsdelivr.net">


    <style> 
        *{
            margin: 0;
            padding: 0;
        }

        section{
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .box{
            height: 150px;
            width: 140px;
            background-color: skyblue;
            border-radius: 20px;
            text-align: center;
            
        }
        .box1{
            background-color: greenyellow;
        }

        .box2{
            background-color: aqua;
        }

        .box3{
            background-color: rgba(0, 204, 255, 0.295)
        }

        .box4{
            background-color: rgb(163, 7, 140)
        }

    </style>
</head>
<body>
    <section>
        <div class="box box1">
            <i class="bi bi-globe"></i>
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit.</p>
        </div>
        <div class="box box2">
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit.</p>
        </div>
        <div class="box box3">
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit.</p>
        </div>
        <div class="box box4">
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit.</p>
        </div>
    </section>
    
</body>
</html>
