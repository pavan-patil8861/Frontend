<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02classTask1</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family:math;
            box-sizing: border-box;
        }

        body{
            justify-content: center;
            align-items: center;
            background-image: url(https://essencepsychology.ca/wp-content/uploads/2020/12/image-placeholder-1-1160x700.jpg);
            height: 100vh;
            background-size: cover;
            background-position: center;

        }
        .outerbox{
            justify-items:center ;
             /* background-color: skyblue; */
            width: 50%;
            display: flex;
            justify-content: center;
            padding: 40px 15px;
        }
        .innerbox{
            width: 100%;
            padding:40px 35px 35px;
            background-color:whitesmoke;
            padding: 30px;
            border-radius: 10px;
            

        }
        h1{
            height:inherit;

        }
        .button{
            justify-content: center;
        }
        
    </style>


</head>

<body>
    <div class="outerbox">
        <div class="innerbox">
            <h1>Login Form</h1>
            <div class="inputBox">
                <input type="email" placeholder="Enter your email">
            </div>
            <div class="password">
                <input type="password" placeholder="Enter your password">
            </div>
            <label>
                <input type="checkbox" name="remember" value="yes">Remember me
            </label><br>
            <label>Forgot password?</label>
            <div class="button">
                <button>Log in</button>
            </div>
            <div class="small"> Don't have an account? Register
            
</body>

</html>
