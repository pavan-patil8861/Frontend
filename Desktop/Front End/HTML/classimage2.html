<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Team Section</title>

    <!-- Simple basic CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #c8a9ff;      /* light purple */
        }

        .team-box {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            font-size: 22px;
        }

        .members {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
        }

        .member {
            text-align: center;
            width: 22%;
        }

        /* Just a circle box instead of real photo */
        .photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 10px;
        }

        .name {
            font-weight: bold;
            margin-bottom: 3px;
        }

        .role {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="team-box">
        <h1>TEAM SECTION</h1>
        <h2>Executive Team</h2>

        <div class="members">
            <div class="member">
                <div class="photo"></div>
                <div class="name">Mrs. Emma</div>
                <div class="role">Graphic Designer</div>
            </div>

            <div class="member">
                <div class="photo"></div>
                <div class="name">Mr. David</div>
                <div class="role">Software Engineer</div>
            </div>

            <div class="member">
                <div class="photo"></div>
                <div class="name">Mr. Liam</div>
                <div class="role">Web Developer</div>
            </div>

            <div class="member">
                <div class="photo"></div>
                <div class="name">Mrs. Sophia</div>
                <div class="role">Product Manager</div>
            </div>
        </div>
    </div>

</body>
</html>
