<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2box</title>

    <style>
        * {
            padding: 0px;
            margin: 0px;

        }

        section{
            display:flex;
            gap: 20px;
            flex-wrap:wrap;
            justify-content: center;
            align-items: center;
            height:100vh;
            align-content: center;
        }
        .box{
            width:300px;
            height:200px;
            background-color: gainsboro;
            
        }

        .button1{
            background-color:rgb(78, 78, 252) ;
            margin: 10px;
            color: white;
            padding:4px;
            
        }

        button.hover{
            
        }

        button{
            padding:4px;
        }

        img{
            width:300px;
            height: 200px;
            align-content: center;
        }

        h1{
                margin: 10px;
            }

            p{
                
                margin: 10px;
            
            }
    </style>

</head>

<body>
    <section>
        <div class="box">
            <h1>Simple 2 Columns Grid</h1>
            <p>Lorem ipsum dolor sit amet dolor sit amet.</p>
            <button class="button1">Get started</button> <button>Learn more-> </button>
        </div>


        <div class="box">
            <img src="https://t3.ftcdn.net/jpg/03/95/66/84/360_F_395668464_GuKi62VG173R4xkSpLXNVnydg91dvjn1.jpg">
        </div>
    </section>
</body>

</html>
